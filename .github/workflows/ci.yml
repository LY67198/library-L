name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Install uv deps
        working-directory: backend
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check app/
      - name: Mypy
        run: uv run mypy app/

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Install uv deps
        run: uv sync --extra dev
      - name: Unit tests
        run: uv run pytest tests/unit -q --cov=app --cov-fail-under=75

  integration-test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: library
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: library
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PASSWORD: test_password
      JWT_SECRET: test_secret_minimum_32_characters_long_xx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
      - name: Install uv deps
        run: uv sync --extra dev
      - name: Run migrations + seed
        run: uv run python scripts/init_db.py
      - name: Integration tests
        run: uv run pytest tests/integration -v
